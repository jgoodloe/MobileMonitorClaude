name: mobile_monitor_claude
description: "A Flutter network monitoring app (URLs, DNS, CRLs) with certificate and CRL expiry tracking. Claude-improved fork of MobileMonitor focused on performance, structure, and maintainability."
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.2

  # Certificate / ASN.1 parsing
  asn1lib: ^1.6.5

  # Structured logging (replaces print() debug statements)
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
